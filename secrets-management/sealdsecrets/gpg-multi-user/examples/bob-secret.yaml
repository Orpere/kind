# Example SealedSecret — Sealed by Bob (bob@corp.com)
# Namespace scope: namespace-wide (can be renamed within the namespace)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-keys
  namespace: production
  labels:
    app: payment-service
    sealed-by: bob@corp.com
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    # Encrypted with Bob's GPG public key
    stripe: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
    sendgrid: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
    twilio: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...
  template:
    type: Opaque
    metadata:
      name: api-keys
      namespace: production
      labels:
        app: payment-service
        environment: production
        sealed-by: bob@corp.com
      annotations:
        description: "Third-party API keys for payment service"
