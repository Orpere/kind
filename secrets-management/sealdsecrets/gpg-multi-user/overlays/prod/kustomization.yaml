apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

namespace: sealed-secrets

# These overlays are designed to be applied AFTER the controller is deployed via Helm.
# They patch the existing Helm-managed Deployment to enable GPG key format.
# Usage: kubectl apply -k overlays/prod/ (after helm install sealed-secrets ...)
patches:
  - target:
      kind: Deployment
      name: sealed-secrets-controller
      namespace: kube-system
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --key-format=gpg
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SEALED_SECRETS_GPG_KEYRING
          value: /tmp/sealed-secrets/key

secretGenerator:
  - name: sealed-secrets-gpg-keys
    namespace: kube-system
    files:
      - secrets.io=sealed-secrets-trusted-keys.asc
    options:
      disableNameSuffixHash: true
