apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: vault-dev

patches:
  # Reduce to single replica (dev mode)
  - target:
      kind: StatefulSet
      name: vault
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Fix ClusterRoleBinding subject namespace to match dev namespace
  - target:
      kind: ClusterRoleBinding
      name: vault
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: vault-dev
  # Replace ConfigMap storage backend from raft to dev file
  - path: configmap-patch.yaml
