apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
data:
  # Dev configuration uses file-backed storage instead of Raft.
  # Single-replica, no HA, no auto-unseal.
  vault.hcl: |
    storage "file" {
      path = "/vault/data"
    }

    listener "tcp" {
      address         = "0.0.0.0:8200"
      cluster_address = "0.0.0.0:8201"
      tls_disable     = true
    }

    service_registration "kubernetes" {}

    disable_mlock = true
