apiVersion: v1
kind: Secret
metadata:
  name: vault-auto-unseal-key
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: server
type: Opaque
stringData:
  # 32-byte hex key for Vault's auto-unseal mechanism.
  # Replace with a real 64-character hex string before deploying:
  #   openssl rand -hex 32
  seal-key: "REPLACE_ME_WITH_32BYTE_HEX_KEY"
