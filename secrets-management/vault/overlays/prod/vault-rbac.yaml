apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-secrets
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: server
rules:
  # Vault reads its own seal key from a Kubernetes Secret for auto-unseal.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-secrets
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-secrets
subjects:
  - kind: ServiceAccount
    name: vault
