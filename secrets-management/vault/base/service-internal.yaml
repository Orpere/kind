apiVersion: v1
kind: Service
metadata:
  name: vault-internal
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: server
  # Headless service for Raft cluster communication.
  # Each pod gets a DNS entry: <pod-name>.vault-internal.<namespace>.svc.cluster.local
spec:
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: vault
  ports:
    - name: cluster
      port: 8201
      targetPort: 8201
      protocol: TCP
  clusterIP: None
