apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: server
spec:
  serviceName: vault-internal
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: vault
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: vault
          image: hashicorp/vault:1.18.0
          imagePullPolicy: IfNotPresent
          args:
            - server
            - -config=/vault/config/vault.hcl
          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
            - name: VAULT_API_ADDR
              value: "http://$(POD_NAME).vault-internal:8200"
            - name: VAULT_CLUSTER_ADDR
              value: "https://$(POD_NAME).vault-internal:8201"
            - name: VAULT_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SKIP_CHOWN
              value: "true"
            - name: HOME
              value: "/vault"
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: ""
          startupProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            periodSeconds: 10
            failureThreshold: 6
          ports:
            - name: http
              containerPort: 8200
              protocol: TCP
            - name: cluster
              containerPort: 8201
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /vault/config
              readOnly: true
            - name: storage
              mountPath: /vault/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: vault-config
        - name: storage
          emptyDir: {}
  # No volumeClaimTemplates in base -- storage uses emptyDir.
  # For production, consider adding PersistentVolume claims via overlay.
