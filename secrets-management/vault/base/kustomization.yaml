apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - statefulset.yaml
  - service.yaml
  - service-internal.yaml
  - serviceaccount.yaml
  - rbac.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: vault
      app.kubernetes.io/component: server
      app.kubernetes.io/part-of: secrets-management
