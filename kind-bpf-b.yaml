kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cluster-b
networking:
  disableDefaultCNI: true  # Do not provision standard Kind network layers
  kubeProxyMode: "none"    # Enable 100% strict eBPF replacement for kube-proxy
  podSubnet: "10.2.0.0/16"
  serviceSubnet: "10.3.0.0/16"
nodes:
- role: control-plane
- role: worker
