apiVersion: v1
kind: Namespace
metadata:
  name: debug
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubuntu-debug
  namespace: debug
  labels:
    app: ubuntu-debug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubuntu-debug
  template:
    metadata:
      labels:
        app: ubuntu-debug
    spec:
      containers:
        - name: ubuntu-debug
          image: ubuntu:24.04
          command: ["sleep", "infinity"]
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: ubuntu-debug-tools
  namespace: debug
  labels:
    app: ubuntu-debug-tools
spec:
  restartPolicy: Never
  containers:
    - name: ubuntu-debug-tools
      image: ubuntu:24.04
      command:
        - sh
        - -c
        - |
          apt-get update &&
          apt-get install -y --no-install-recommends \
            iproute2 iputils-ping curl wget dnsutils net-tools \
            tcpdump nmap traceroute mtr iperf3 telnet socat \
            ethtool bridge-utils iptables conntrack arping \
            openssh-client vim less bash-completion ca-certificates &&
          echo "All network tools installed. Sleeping..." &&
          sleep infinity
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
            - NET_RAW
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
