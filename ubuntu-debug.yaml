apiVersion: v1
kind: Pod
metadata:
  name: ubuntu-debug
  namespace: default
  labels:
    app: ubuntu-debug
spec:
  restartPolicy: Never
  containers:
    - name: ubuntu-debug
      image: ubuntu:24.04
      command:
        - sh
        - -c
        - |
          set +e
          for i in 1 2 3; do
            apt-get update && break
            echo "apt-get update failed, retrying ($i)..."
            sleep 3
          done
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            iproute2 iputils-ping curl wget dnsutils net-tools \
            tcpdump nmap traceroute mtr iperf3 telnet socat \
            ethtool bridge-utils iptables conntrack arping \
            openssh-client vim less bash-completion ca-certificates
          echo "Network tools install attempted. Sleeping..."
          sleep infinity
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
            - NET_RAW
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
