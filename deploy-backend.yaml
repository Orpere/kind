# deploy-backend.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: http
        image: hashicorp/http-echo:latest
        args:
          - "-text=Hello from Cluster B! 🎉"
          - "-listen=:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
  annotations:
    # Cilium Global Service annotation — makes this service reachable across the
    # ClusterMesh. NOTE: the correct key is `service.cilium.io/global` (the older
    # `cilium.io/global-service` key is deprecated and silently ignored).
    service.cilium.io/global: "true"
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080